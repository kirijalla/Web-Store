<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="icon" type="image/png" href="images\logo.png" />
    <link rel="stylesheet" href="css/products.css" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">
          <img src="images\logo.png" alt="logo" width="75" height="75" />
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNavAltMarkup"
          aria-controls="navbarNavAltMarkup"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
          <div class="navbar-nav">
            <a class="nav-link" href="index.html"
              >Home</a
            >
            <a class="nav-link" href="products.html">Products</a>
            <a class="nav-link" href="cart.html">Cart</a>
            <a class="nav-link active" aria-current="page" href="checkout.html">Checkout</a>
            <a class="nav-link" href="about.html">About</a>
            <a class="nav-link" href="contact.html">Contact</a>
            <a class="nav-link" href="login.html">Login</a>
            <a class="nav-link" href="register.html">Register</a>
            <a class="nav-link" href="profile.html">Profile</a>
            <button class="btn btn-outline-secondary ms-auto" id="dark-toggle">Dark Mode</button>
          </div>
        </div>
      </div>
    </nav>

    <div class="container mt-4">
      <div class="row">
        <div class="col-md-6">
          <h3>Billing Information</h3>
          <div id="billing-form">
            <div class="mb-3">
              <label class="form-label">Full Name</label>
              <input
                type="text"
                class="form-control"
                id="name"
                placeholder="John Doe"
              />
              <span class="text-danger" id="name-error"></span>
            </div>
            <div class="mb-3">
              <label class="form-label">Address</label>
              <input
                type="text"
                class="form-control"
                id="address"
                placeholder="123 Main St"
              />
              <span class="text-danger" id="address-error"></span>
            </div>
            <div class="mb-3">
              <label class="form-label">Payment Method</label>
              <select class="form-select" id="payment">
                <option value="">Select...</option>
                <option value="credit">Credit Card</option>
                <option value="paypal">PayPal</option>
                <option value="cash">Cash on Delivery</option>
              </select>
              <span class="text-danger" id="payment-error"></span>
            </div>
            <button class="btn btn-primary" id="place-order">
              Place Order
            </button>
          </div>

          <div id="confirmation" style="display: none">
            <h4 class="text-success">Order placed successfully!</h4>
            <p>Thank you for your purchase. Your order is being processed.</p>
          </div>
        </div>

        <div class="col-md-6">
          <h3>Order Summary</h3>
          <div id="order-summary"></div>
          <h5>Total: <span id="order-total">$0.00</span></h5>
          
        </div>
      </div>
    </div>

    <script src="js/checkout.js"></script>
    <script src="js/darkmode.js"></script>
  </body>
</html>
