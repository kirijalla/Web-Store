    <form id="loginForm">
      <label>UserName:</label>
      <input type="text" id="username" /><br /><br />
      <label>Password:</label>
      <input type="password" id="password" /><br /><br />
      <button type="submit">Login</button>
    </form>
    <script>
      document
        .getElementById("loginForm")
        .addEventListener("submit", function (event) {
          //prevent my page keep loading.
          event.preventDefault();

          let usern = document.getElementById("username").value;
          let pass = document.getElementById("password").value;

          //alert("hello  " + usern);

          console.log("the user name is " + usern);
          console.log("the pass is  " + pass);
        });
    </script>

    <input type="text" id="myinput" placeholder="Put your name" />
    <p id="result"></p>

    <script>
      let input = document.getElementById("myinput");

      input.addEventListener("input", function () {
        document.getElementById("result").textContent = "Helloo " + input.value;
      });
