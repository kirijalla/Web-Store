  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">
          <img src="images\logo.png" alt="logo" width="75" height="75" />
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNavAltMarkup"
          aria-controls="navbarNavAltMarkup"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
          <div class="navbar-nav">
            <a class="nav-link" href="index.html">Home</a>
            <a class="nav-link" href="products.html">Products</a>

        <div class="col-md-4">
          <div class="card text-center p-4">
            <div>
              <img
                src="images/profile.webp"
                alt="Andres"
                class="rounded-circle bg-secondary mx-auto mb-1"
                style="width: 80px; height: 80px"
              />

            <h5 class="card-title" id="name"></h5>
            <h4 class="card-text" id="email"></h4>
          </div>
        </div>
      </div>
    </div>

    <script>
     let account = JSON.parse(localStorage.getItem("account"));
      document.getElementById("name").textContent = account.name;
      document.getElementById("email").textContent = account.email;
    </script>
